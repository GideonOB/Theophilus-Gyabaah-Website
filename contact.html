<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | UG Final Year Student Portfolio</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="container nav">
        <div class="brand">UG Student Portfolio</div>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="projects.html">Projects</a></li>
          <li><a href="final-year-project.html">Final-Year Project</a></li>
          <li><a href="skills.html">Skills</a></li>
          <li><a href="resume.html">Resume</a></li>
          <li><a class="active" href="contact.html">Contact</a></li>
        </ul>
      </div>
    </header>

    <main>
      <div class="container">
        <section class="hero">
          <p class="subtitle">Contact</p>
          <h1>Let's connect.</h1>
          <p>
            Interested in collaborating, discussing ideas, or reviewing my work? Send a message.
          </p>
        </section>

        <article class="card">
          <h2 class="section-title">Contact Form</h2>
          <form>
            <label>
              Name
              <input type="text" name="name" placeholder="Your name" />
            </label>
            <label>
              Email
              <input type="email" name="email" placeholder="you@example.com" />
            </label>
            <label>
              Message
              <textarea name="message" placeholder="Write your message..."></textarea>
            </label>
            <button class="btn btn-primary" type="submit">Send Message</button>
          </form>
        </article>
      </div>
    </main>

    <footer>
      <div class="container">© 2026 Theophilus Gyabaah · University of Ghana</div>
    </footer>
  </body>
</html>
